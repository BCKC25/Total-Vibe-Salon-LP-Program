version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: totalvibe
      POSTGRES_PASSWORD: totalvibe
      POSTGRES_DB: totalvibe
      TZ: ${TZ:-America/New_York}
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/migrations:/migrations

  app:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://totalvibe:totalvibe@db:5432/totalvibe
      SESSION_SECRET: ${SESSION_SECRET}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3002}
      TZ: ${TZ:-America/New_York}
    ports:
      - "3002:3000"
    volumes:
      - ./src:/app/src
      - ./public:/app/public

volumes:
  db_data:
