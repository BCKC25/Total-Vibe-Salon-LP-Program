version: "3.9"

# Production variant of docker-compose.yml — use this on the VPS.
# Differences from the dev version:
#   - Builds Dockerfile.prod (next build + next start) instead of
#     running next dev, which was the source of the compile-on-request
#     lag. See CLAUDE.md "Production deploy".
#   - No ./src or ./public volume mount — the built app is baked into
#     the image, so code changes need a rebuild+redeploy (git pull +
#     docker compose -f docker-compose.prod.yml up --build -d), not a
#     live-reloading file edit.
#
# Run with: docker compose -f docker-compose.prod.yml up --build -d

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: totalvibe
      POSTGRES_PASSWORD: totalvibe
      POSTGRES_DB: totalvibe
      TZ: ${TZ:-America/New_York}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/migrations:/migrations

  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://totalvibe:totalvibe@db:5432/totalvibe
      SESSION_SECRET: ${SESSION_SECRET}
      APP_BASE_URL: ${APP_BASE_URL}
      # See src/lib/session.ts — leave this false until Caddy/HTTPS is
      # actually in front of this app, then flip to true. A Secure
      # cookie over plain HTTP is silently dropped by the browser and
      # login will appear to fail with no clear error.
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      TZ: ${TZ:-America/New_York}
    ports:
      - "3002:3000"

  # Opt-in: only starts when you run with `--profile caddy`, e.g.
  #   docker compose -f docker-compose.prod.yml --profile caddy up --build -d
  # Not started by default so it doesn't sit there failing to get a
  # certificate for the placeholder domain in ./Caddyfile before you've
  # replaced it with the real one. See CLAUDE.md "Domain + HTTPS" for
  # the full switchover steps (DNS, editing Caddyfile, COOKIE_SECURE).
  caddy:
    image: caddy:2
    restart: unless-stopped
    profiles: ["caddy"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - app

volumes:
  db_data:
  caddy_data:
